name: ci-citation

on:
  pull_request:
    paths: ["CITATION.cff"]
  push:
    branches: [main]
    paths: ["CITATION.cff"]
  workflow_dispatch:

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - run: pipx run cffconvert --validate
