name: ci-citation

on:
  pull_request:
    paths: ["CITATION.cff"]
  push:
    branches: [main]
    paths: ["CITATION.cff"]
  workflow_dispatch:

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09  # v5
        with:
          persist-credentials: false
      - run: pipx run cffconvert --validate
